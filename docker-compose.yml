volumes:
  locker: {}

services:
  locker-backend:
    build:
      dockerfile: ./Dockerfile
    ports:
      - "8443:8443"
    env_file:
      - .env
    volumes:
      - ./ssl_certificates:/ssl_certificates:ro
      - ./logs:/usr/local/bin/trace:rw
  locker-db:
    image: postgres:latest
    ports:
      - "5432:5432"
    volumes:
      - locker:/var/lib/postgres/data
      - ./src/database/migrations:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_PORT=5432
      - POSTGRES_URL=${DATABASE_HOST}
      - POSTGRES_DB=${DATABASE_SCHEMA}
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}